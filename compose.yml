x-default-service: &default-service
  env_file:
    - .env
  restart: no
  networks:
    - citibike-net

services:
  postgres:
    image: postgres:16
    container_name: citibike-postgres
    <<: *default-service
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: citibike_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - pgdata-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow:
    build: ./airflow
    container_name: citibike-airflow
    <<: *default-service
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
    group_add:
      - "${DOCKER_SOCKET_GROUP_ID:-999}"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dataset-vol:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: standalone

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    container_name: citibike-dbt
    <<: *default-service
    working_dir: /usr/app/citibike_project
    volumes:
      - ./dbt:/usr/app
      - ./dbt:/root/.dbt
    depends_on:
      - postgres
    environment:
      DBT_PROFILES_DIR: /root/.dbt
    command: debug

  metabase:
    image: metabase/metabase:v0.57.10
    <<: *default-service
    container_name: citibike-metabase
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: postgres

volumes:
  pgdata-volume:

networks:
  citibike-net:
    driver: bridge
